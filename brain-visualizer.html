<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Brain Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  padding: 12px 20px;
  background: #12121a;
  border-bottom: 1px solid #2a2a3a;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #a0a0ff;
}
.controls {
  display: flex;
  gap: 8px;
  margin-left: auto;
}
button {
  padding: 6px 14px;
  border: 1px solid #3a3a5a;
  border-radius: 6px;
  background: #1a1a2e;
  color: #c0c0e0;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
}
button:hover { background: #2a2a4e; border-color: #5a5a8a; }
button.primary { background: #2a2a6e; border-color: #4a4aaa; color: #d0d0ff; }
button.primary:hover { background: #3a3aae; }
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}
.sidebar {
  width: 380px;
  min-width: 300px;
  background: #0e0e16;
  border-right: 1px solid #2a2a3a;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }
.sidebar-header {
  padding: 10px 14px;
  background: #12121a;
  border-bottom: 1px solid #2a2a3a;
  font-size: 13px;
  font-weight: 600;
  color: #8888aa;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
textarea {
  flex: 1;
  background: #08080e;
  color: #b0b0d0;
  border: none;
  padding: 12px;
  font-family: 'Cascadia Code', 'Fira Code', monospace;
  font-size: 12px;
  resize: none;
  outline: none;
  line-height: 1.5;
}
textarea::placeholder { color: #3a3a5a; }
.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.info-panel {
  position: absolute;
  top: 12px;
  right: 12px;
  background: #12121aee;
  border: 1px solid #2a2a3a;
  border-radius: 8px;
  padding: 14px;
  min-width: 240px;
  max-width: 320px;
  font-size: 12px;
  backdrop-filter: blur(8px);
}
.info-panel h3 {
  font-size: 13px;
  color: #8888cc;
  margin-bottom: 8px;
  border-bottom: 1px solid #2a2a3a;
  padding-bottom: 6px;
}
.info-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
}
.info-label { color: #7777aa; }
.info-value { color: #c0c0e0; font-family: monospace; }
.hover-tooltip {
  position: absolute;
  background: #1a1a2eee;
  border: 1px solid #4a4a7a;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 12px;
  pointer-events: none;
  display: none;
  backdrop-filter: blur(8px);
  z-index: 10;
  white-space: nowrap;
}
.legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: #12121aee;
  border: 1px solid #2a2a3a;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 11px;
  backdrop-filter: blur(8px);
}
.legend-title { color: #8888aa; margin-bottom: 6px; font-weight: 600; }
.legend-gradient {
  width: 180px;
  height: 12px;
  border-radius: 3px;
  margin: 4px 0;
}
.legend-labels {
  display: flex;
  justify-content: space-between;
  color: #7777aa;
  font-family: monospace;
}
.tab-bar {
  display: flex;
  border-bottom: 1px solid #2a2a3a;
  background: #10101a;
}
.tab {
  padding: 8px 16px;
  font-size: 12px;
  color: #6666aa;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.tab:hover { color: #9999cc; }
.tab.active { color: #aaaaff; border-bottom-color: #6666cc; }
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px;
}
.stat-card {
  background: #14141e;
  border: 1px solid #2a2a3a;
  border-radius: 6px;
  padding: 10px;
}
.stat-card .label { font-size: 10px; color: #6666aa; text-transform: uppercase; }
.stat-card .value { font-size: 16px; color: #c0c0ff; font-weight: 600; margin-top: 2px; }
.view-controls {
  position: absolute;
  bottom: 12px;
  right: 12px;
  display: flex;
  gap: 6px;
}
.view-controls button {
  width: 32px;
  height: 32px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  border-radius: 6px;
}
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #4a4a6a;
  gap: 12px;
}
.empty-state svg { opacity: 0.3; }
.empty-state p { font-size: 14px; }
</style>
</head>
<body>
<header>
  <h1>Neural Brain Visualizer</h1>
  <div class="controls">
    <input type="file" id="fileInput" accept=".json,application/json" style="display:none" onchange="loadFile(event)">
    <button onclick="document.getElementById('fileInput').click()">📁 Choose File</button>
    <button onclick="loadExample()">Load Example</button>
    <button onclick="toggleSidebar()">Toggle Input</button>
    <button class="primary" onclick="visualize()">Visualize</button>
  </div>
</header>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Brain JSON Input</div>
    <textarea id="jsonInput" placeholder="Paste your brain JSON here..."></textarea>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div class="hover-tooltip" id="tooltip"></div>
    <div class="info-panel" id="infoPanel" style="display:none;"></div>
    <div class="legend" id="legend" style="display:none;">
      <div class="legend-title">Connection Weight</div>
      <canvas id="legendGradient" width="180" height="12" style="border-radius:3px;"></canvas>
      <div class="legend-labels"><span>-0.5</span><span>0</span><span>+0.5</span></div>
      <div style="margin-top:8px; color:#7777aa;">
        Node color = bias value<br>
        Line opacity = |weight|
      </div>
    </div>
    <div class="view-controls">
      <button onclick="zoomIn()" title="Zoom in">+</button>
      <button onclick="zoomOut()" title="Zoom out">-</button>
      <button onclick="resetView()" title="Reset view">&#8634;</button>
    </div>
    <div class="empty-state" id="emptyState">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="12" r="2"/>
        <line x1="8" y1="6" x2="16" y2="12"/><line x1="8" y1="18" x2="16" y2="12"/>
      </svg>
      <p>Click <b>📁 Choose File</b>, paste JSON, or drag &amp; drop a .json file</p>
      <button class="primary" onclick="document.getElementById('fileInput').click()" style="margin-top:8px;">📁 Choose File</button>
    </div>
    <div id="dropOverlay" style="position:absolute;inset:0;background:#2a2a6e88;border:3px dashed #8888ff;display:none;align-items:center;justify-content:center;font-size:24px;color:#fff;font-weight:600;backdrop-filter:blur(4px);z-index:20;">
      Drop brain JSON file here
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const infoPanel = document.getElementById('infoPanel');
const legend = document.getElementById('legend');
const emptyState = document.getElementById('emptyState');

let brain = null;
let nodes = [];
let connections = [];
let viewState = { offsetX: 0, offsetY: 0, scale: 1 };
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let hoveredNode = null;
let hoveredConn = null;
let animFrame = null;

function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  if (brain) draw();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
  setTimeout(resizeCanvas, 50);
}

function visualize() {
  const raw = document.getElementById('jsonInput').value.trim();
  if (!raw) return;
  try {
    brain = JSON.parse(raw);
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
    return;
  }
  if (!brain.shape || !brain.weights) {
    alert('Missing required fields: shape, weights');
    return;
  }
  emptyState.style.display = 'none';
  legend.style.display = 'block';
  buildNetwork();
  buildInfoPanel();
  drawLegend();
  resetView();
  draw();
}

function buildNetwork() {
  nodes = [];
  connections = [];
  const shape = brain.shape;
  const w = document.getElementById('canvasWrap').clientWidth;
  const h = document.getElementById('canvasWrap').clientHeight;
  const layerGap = w / (shape.length + 1);
  const maxNodes = Math.max(...shape);

  const inputLabels = parseSchemaLabels(brain.inputSchema, shape[0]);
  const outputLabels = parseSchemaLabels(brain.outputSchema, shape[shape.length - 1]);

  for (let l = 0; l < shape.length; l++) {
    const count = shape[l];
    const x = layerGap * (l + 1);
    const nodeGap = Math.min(28, (h - 60) / (count + 1));
    const startY = (h - nodeGap * (count - 1)) / 2;
    for (let n = 0; n < count; n++) {
      const bias = getBias(l, n);
      let label = '';
      if (l === 0 && inputLabels[n]) label = inputLabels[n];
      if (l === shape.length - 1 && outputLabels[n]) label = outputLabels[n];
      nodes.push({
        x, y: startY + n * nodeGap,
        layer: l, index: n, bias,
        radius: 6,
        label
      });
    }
  }

  for (let l = 0; l < brain.weights.length; l++) {
    const layerWeights = brain.weights[l];
    for (let from = 0; from < layerWeights.length; from++) {
      for (let to = 0; to < layerWeights[from].length; to++) {
        const weight = layerWeights[from][to];
        const srcNode = nodes.find(n => n.layer === l && n.index === from);
        const dstNode = nodes.find(n => n.layer === l + 1 && n.index === to);
        if (srcNode && dstNode) {
          connections.push({ src: srcNode, dst: dstNode, weight, layerIdx: l });
        }
      }
    }
  }
}

function parseSchemaLabels(schema, count) {
  const labels = [];
  if (!schema) return labels;
  for (let i = 0; i < count; i++) labels.push('');
  if (schema.includes('MovementInput')) {
    const ml = ['health','hunger','targetDist','targetYaw','targetPitch',
      'relVelX','relVelY','relVelZ','onGround','inWater','inLava',
      'isBlocking','isSprinting','targetHealth','targetBlocking',
      'heightDiff','nearEdge','blocksAhead','blocksLeft','blocksRight',
      'comboCount','lastHitAge','cooldownPct','hasShield','hasBow',
      'weaponType','armorValue','potionActive','targetArmor','tickCount'];
    for (let i = 0; i < Math.min(ml.length, count); i++) labels[i] = ml[i];
  }
  if (schema.includes('MovementOutput')) {
    const ml = ['forward','strafe','jump','sneak','sprint','attackDir','blockDir','special'];
    for (let i = 0; i < Math.min(ml.length, count); i++) labels[i] = ml[i];
  }
  return labels;
}

function getBias(layer, index) {
  if (!brain.biases || layer === 0) return 0;
  const biasLayer = brain.biases[layer - 1];
  if (!biasLayer) return 0;
  return biasLayer[index] || 0;
}

function weightColor(w) {
  const clamped = Math.max(-0.5, Math.min(0.5, w));
  if (clamped >= 0) {
    const t = clamped / 0.5;
    return `rgb(${Math.round(40 + 20 * t)}, ${Math.round(120 + 135 * t)}, ${Math.round(200 + 55 * t)})`;
  } else {
    const t = -clamped / 0.5;
    return `rgb(${Math.round(200 + 55 * t)}, ${Math.round(80 - 40 * t)}, ${Math.round(80 - 40 * t)})`;
  }
}

function biasColor(b) {
  const clamped = Math.max(-0.4, Math.min(0.4, b));
  if (clamped >= 0) {
    const t = clamped / 0.4;
    return `rgb(${Math.round(60 + 40 * t)}, ${Math.round(180 + 75 * t)}, ${Math.round(120 + 60 * t)})`;
  } else {
    const t = -clamped / 0.4;
    return `rgb(${Math.round(220 + 35 * t)}, ${Math.round(140 - 60 * t)}, ${Math.round(60)})`;
  }
}

function draw() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);
  if (!brain) return;

  ctx.save();
  ctx.translate(viewState.offsetX, viewState.offsetY);
  ctx.scale(viewState.scale, viewState.scale);

  for (const c of connections) {
    const absW = Math.abs(c.weight);
    const alpha = Math.max(0.03, Math.min(0.6, absW * 1.2));
    const isHovered = hoveredConn === c;
    const connectedToHovered = hoveredNode && (c.src === hoveredNode || c.dst === hoveredNode);

    if (hoveredNode && !connectedToHovered) {
      ctx.globalAlpha = 0.015;
    } else if (isHovered) {
      ctx.globalAlpha = 1;
    } else if (connectedToHovered) {
      ctx.globalAlpha = Math.max(0.3, alpha);
    } else {
      ctx.globalAlpha = alpha;
    }

    ctx.strokeStyle = weightColor(c.weight);
    ctx.lineWidth = isHovered ? 2.5 : (connectedToHovered ? 1.5 : 0.8);
    ctx.beginPath();
    ctx.moveTo(c.src.x, c.src.y);
    const cpx = (c.src.x + c.dst.x) / 2;
    ctx.bezierCurveTo(cpx, c.src.y, cpx, c.dst.y, c.dst.x, c.dst.y);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;

  for (const n of nodes) {
    const isHovered = hoveredNode === n;
    const r = isHovered ? n.radius + 3 : n.radius;

    ctx.beginPath();
    ctx.arc(n.x, n.y, r + 2, 0, Math.PI * 2);
    ctx.fillStyle = isHovered ? '#ffffff22' : '#ffffff08';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    ctx.fillStyle = n.layer === 0 ? '#5577cc' : biasColor(n.bias);
    ctx.fill();
    ctx.strokeStyle = isHovered ? '#ffffff88' : '#ffffff22';
    ctx.lineWidth = isHovered ? 2 : 1;
    ctx.stroke();

    if (n.label) {
      ctx.fillStyle = '#8888bb';
      ctx.font = '9px Segoe UI, sans-serif';
      ctx.textAlign = n.layer === 0 ? 'right' : 'left';
      const lx = n.layer === 0 ? n.x - r - 6 : n.x + r + 6;
      ctx.fillText(n.label, lx, n.y + 3);
    }
  }

  const shape = brain.shape;
  const layerGap = w / (shape.length + 1) / viewState.scale;
  ctx.font = '11px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#555577';
  const layerNames = ['Input', ...Array(shape.length - 2).fill(0).map((_, i) => `Hidden ${i + 1}`), 'Output'];
  for (let l = 0; l < shape.length; l++) {
    const x = layerGap * (l + 1);
    ctx.fillText(`${layerNames[l]} (${shape[l]})`, x, 20);
  }

  ctx.restore();
}

function buildInfoPanel() {
  if (!brain) { infoPanel.style.display = 'none'; return; }
  infoPanel.style.display = 'block';
  const t = brain.training || {};
  const totalWeights = brain.weights.reduce((s, l) => s + l.reduce((s2, r) => s2 + r.length, 0), 0);
  const totalBiases = brain.biases ? brain.biases.reduce((s, l) => s + l.length, 0) : 0;
  const allW = brain.weights.flat(2);
  const minW = Math.min(...allW).toFixed(4);
  const maxW = Math.max(...allW).toFixed(4);
  const avgW = (allW.reduce((a, b) => a + b, 0) / allW.length).toFixed(4);

  infoPanel.innerHTML = `
    <h3>Network Info</h3>
    <div class="info-row"><span class="info-label">Mode</span><span class="info-value">${brain.mode || '—'}</span></div>
    <div class="info-row"><span class="info-label">Shape</span><span class="info-value">[${brain.shape.join(', ')}]</span></div>
    <div class="info-row"><span class="info-label">Parameters</span><span class="info-value">${(totalWeights + totalBiases).toLocaleString()}</span></div>
    <div class="info-row"><span class="info-label">Weights</span><span class="info-value">${totalWeights.toLocaleString()}</span></div>
    <div class="info-row"><span class="info-label">Biases</span><span class="info-value">${totalBiases.toLocaleString()}</span></div>
    <div class="info-row"><span class="info-label">Weight range</span><span class="info-value">${minW} .. ${maxW}</span></div>
    <div class="info-row"><span class="info-label">Avg weight</span><span class="info-value">${avgW}</span></div>
    ${t.generation != null ? `<h3 style="margin-top:10px">Training</h3>
    <div class="info-row"><span class="info-label">Generation</span><span class="info-value">${t.generation}</span></div>
    <div class="info-row"><span class="info-label">Best fitness</span><span class="info-value">${t.bestFitness?.toFixed(1) || '—'}</span></div>
    <div class="info-row"><span class="info-label">Avg fitness</span><span class="info-value">${t.averageFitness?.toFixed(1) || '—'}</span></div>
    <div class="info-row"><span class="info-label">Config</span><span class="info-value">${t.configHash || '—'}</span></div>
    <div class="info-row"><span class="info-label">Source</span><span class="info-value">${t.source || '—'}</span></div>` : ''}
    ${t.loadoutMix ? `<div style="margin-top:8px;font-size:11px;color:#6666aa;"><b>Loadout mix:</b><br><span style="color:#9999cc;">${t.loadoutMix}</span></div>` : ''}
  `;
}

function drawLegend() {
  const lc = document.getElementById('legendGradient');
  const lctx = lc.getContext('2d');
  const grad = lctx.createLinearGradient(0, 0, 180, 0);
  for (let i = 0; i <= 20; i++) {
    const t = i / 20;
    const w = -0.5 + t;
    grad.addColorStop(t, weightColor(w));
  }
  lctx.fillStyle = grad;
  lctx.fillRect(0, 0, 180, 12);
}

function screenToWorld(sx, sy) {
  return {
    x: (sx - viewState.offsetX) / viewState.scale,
    y: (sy - viewState.offsetY) / viewState.scale
  };
}

function findNodeAt(wx, wy) {
  for (const n of nodes) {
    const dx = n.x - wx, dy = n.y - wy;
    if (dx * dx + dy * dy < (n.radius + 4) * (n.radius + 4)) return n;
  }
  return null;
}

function findConnAt(wx, wy) {
  let best = null, bestDist = 6;
  for (const c of connections) {
    const steps = 20;
    for (let i = 0; i <= steps; i++) {
      const t = i / steps;
      const cpx = (c.src.x + c.dst.x) / 2;
      const mt = 1 - t;
      const px = mt * mt * mt * c.src.x + 3 * mt * mt * t * cpx + 3 * mt * t * t * cpx + t * t * t * c.dst.x;
      const py = mt * mt * mt * c.src.y + 3 * mt * mt * t * c.src.y + 3 * mt * t * t * c.dst.y + t * t * t * c.dst.y;
      const dx = px - wx, dy = py - wy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < bestDist) { bestDist = dist; best = c; }
    }
  }
  return best;
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left;
  const sy = e.clientY - rect.top;

  if (isDragging) {
    viewState.offsetX += e.movementX;
    viewState.offsetY += e.movementY;
    draw();
    return;
  }

  const wp = screenToWorld(sx, sy);
  const node = findNodeAt(wp.x, wp.y);
  const conn = node ? null : findConnAt(wp.x, wp.y);

  if (node !== hoveredNode || conn !== hoveredConn) {
    hoveredNode = node;
    hoveredConn = conn;
    draw();
  }

  if (node) {
    const biasStr = node.layer === 0 ? 'N/A (input)' : node.bias.toFixed(6);
    const connsIn = connections.filter(c => c.dst === node).length;
    const connsOut = connections.filter(c => c.src === node).length;
    tooltip.innerHTML = `
      <b>Layer ${node.layer}, Node ${node.index}</b>${node.label ? ` (${node.label})` : ''}<br>
      Bias: <span style="color:${biasColor(node.bias)}">${biasStr}</span><br>
      Connections: ${connsIn} in, ${connsOut} out
    `;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
    canvas.style.cursor = 'pointer';
  } else if (conn) {
    tooltip.innerHTML = `
      <b>Weight</b>: <span style="color:${weightColor(conn.weight)}">${conn.weight.toFixed(6)}</span><br>
      Layer ${conn.layerIdx} &rarr; ${conn.layerIdx + 1}<br>
      Node ${conn.src.index} &rarr; ${conn.dst.index}
    `;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX - rect.left + 14) + 'px';
    tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
    canvas.style.cursor = 'crosshair';
  } else {
    tooltip.style.display = 'none';
    canvas.style.cursor = 'grab';
  }
});

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = 'grab';
});

canvas.addEventListener('mouseleave', () => {
  isDragging = false;
  tooltip.style.display = 'none';
  hoveredNode = null;
  hoveredConn = null;
  draw();
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.2, Math.min(5, viewState.scale * delta));
  const ratio = newScale / viewState.scale;
  viewState.offsetX = mx - (mx - viewState.offsetX) * ratio;
  viewState.offsetY = my - (my - viewState.offsetY) * ratio;
  viewState.scale = newScale;
  draw();
}, { passive: false });

function zoomIn() { viewState.scale = Math.min(5, viewState.scale * 1.2); draw(); }
function zoomOut() { viewState.scale = Math.max(0.2, viewState.scale * 0.8); draw(); }
function resetView() { viewState = { offsetX: 0, offsetY: 0, scale: 1 }; draw(); }

function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('jsonInput').value = e.target.result;
    visualize();
  };
  reader.onerror = () => alert('Failed to read file');
  reader.readAsText(file);
  event.target.value = '';
}

const dropOverlay = document.getElementById('dropOverlay');
let dragDepth = 0;
window.addEventListener('dragenter', e => {
  e.preventDefault();
  dragDepth++;
  dropOverlay.style.display = 'flex';
});
window.addEventListener('dragleave', e => {
  e.preventDefault();
  dragDepth--;
  if (dragDepth <= 0) { dragDepth = 0; dropOverlay.style.display = 'none'; }
});
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('drop', e => {
  e.preventDefault();
  dragDepth = 0;
  dropOverlay.style.display = 'none';
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('jsonInput').value = ev.target.result;
    visualize();
  };
  reader.readAsText(file);
});
